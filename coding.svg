<svg viewBox="0 0 440 300" xmlns="http://www.w3.org/2000/svg" fill="none" font-family="'Fira Code','SFMono-Regular',monospace">
  <defs>
    <linearGradient id="scr" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1730"/><stop offset="100%" stop-color="#0a1020"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6dd5ed"/><stop offset="100%" stop-color="#1a6fb5"/>
    </linearGradient>
    <style>
      @keyframes blink { 50% { opacity:0 } }
      @keyframes rise  { 0%{ transform:translateY(0); opacity:0 } 20%{opacity:.7} 100%{ transform:translateY(-26px); opacity:0 } }
      @keyframes reveal{ to { width: var(--w) } }
      .cur { animation: blink 1.05s steps(1) infinite }
      .steam { transform-box: fill-box; transform-origin: center; }
      .s1 { animation: rise 2.6s ease-in infinite }
      .s2 { animation: rise 2.6s ease-in .9s infinite }
      .s3 { animation: rise 2.6s ease-in 1.7s infinite }
      .ln { height:7px; rx:3.5px; width:0; animation: reveal .5s ease-out forwards }
      .l1{--w:120px;animation-delay:.2s} .l2{--w:170px;animation-delay:.7s}
      .l3{--w:90px; animation-delay:1.2s} .l4{--w:150px;animation-delay:1.7s}
      .l5{--w:110px;animation-delay:2.2s} .l6{--w:64px; animation-delay:2.7s}
    </style>
  </defs>

  <!-- desk -->
  <rect x="0" y="250" width="440" height="10" rx="4" fill="#12203f"/>
  <rect x="40" y="258" width="360" height="30" rx="6" fill="#0c1730"/>

  <!-- monitor stand -->
  <rect x="205" y="212" width="30" height="30" fill="#16233f"/>
  <rect x="175" y="240" width="90" height="10" rx="4" fill="#1c2c4d"/>

  <!-- monitor body -->
  <rect x="70" y="40" width="300" height="180" rx="12" fill="#16233f"/>
  <!-- screen -->
  <rect x="82" y="52" width="276" height="156" rx="7" fill="url(#scr)"/>
  <!-- top edge accent -->
  <rect x="82" y="52" width="276" height="3" rx="2" fill="url(#edge)"/>

  <!-- editor chrome -->
  <circle cx="98"  cy="68" r="3.5" fill="#ff5f56"/>
  <circle cx="110" cy="68" r="3.5" fill="#ffbd2e"/>
  <circle cx="122" cy="68" r="3.5" fill="#27c93f"/>
  <rect x="150" y="64" width="120" height="8" rx="4" fill="#22314f"/>

  <!-- code lines (type in sequentially) -->
  <g>
    <rect class="ln l1" x="100" y="88"  fill="#6dd5ed"/>
    <rect class="ln l2" x="100" y="104" fill="#8b9dc0"/>
    <rect class="ln l3" x="116" y="120" fill="#c792ea"/>
    <rect class="ln l4" x="116" y="136" fill="#8b9dc0"/>
    <rect class="ln l5" x="100" y="152" fill="#82e0aa"/>
    <rect class="ln l6" x="100" y="168" fill="#6dd5ed"/>
    <!-- blinking cursor -->
    <rect class="cur" x="168" y="167" width="7" height="9" fill="#ffffff"/>
  </g>

  <!-- keyboard -->
  <rect x="120" y="252" width="200" height="8" rx="3" fill="#1c2c4d"/>

  <!-- coffee mug + steam -->
  <g transform="translate(372,196)">
    <rect x="0" y="0" width="34" height="26" rx="4" fill="#1a6fb5"/>
    <rect x="4" y="4" width="26" height="8" rx="2" fill="#0d1730"/>
    <path d="M34 6 q12 0 12 9 t-12 9" stroke="#1a6fb5" stroke-width="4" fill="none"/>
    <path class="steam s1" d="M9 -6 q-4 -6 0 -12"  stroke="#6dd5ed" stroke-width="2" fill="none" opacity="0"/>
    <path class="steam s2" d="M17 -6 q4 -6 0 -12"  stroke="#6dd5ed" stroke-width="2" fill="none" opacity="0"/>
    <path class="steam s3" d="M25 -6 q-4 -6 0 -12" stroke="#6dd5ed" stroke-width="2" fill="none" opacity="0"/>
  </g>
</svg>
